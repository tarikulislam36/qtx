<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Quotation PDF Maker</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      background: #f3f4f6;
    }

    /* A4 Paper */
    #invoice {
      width: 210mm;
      min-height: 297mm;
      background: white;
      margin: auto;
    }

    @media print {
      body {
        background: white;
      }
    }
  </style>
</head>
<body class="p-5">

  <!-- FORM -->
  <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-md mb-6">

    <h1 class="text-3xl font-bold mb-6">
      Create Quotation
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <div>
        <label class="block mb-1 font-medium">
          Client Name
        </label>

        <input
          id="clientName"
          type="text"
          placeholder="Enter client name"
          class="w-full border rounded-lg p-3"
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">
          Product / Service
        </label>

        <input
          id="product"
          type="text"
          placeholder="Enter product"
          class="w-full border rounded-lg p-3"
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">
          Quantity
        </label>

        <input
          id="quantity"
          type="number"
          value="1"
          class="w-full border rounded-lg p-3"
        />
      </div>

      <div>
        <label class="block mb-1 font-medium">
          Price
        </label>

        <input
          id="price"
          type="number"
          placeholder="Enter amount"
          class="w-full border rounded-lg p-3"
        />
      </div>

    </div>

    <button
      onclick="updateInvoice()"
      class="mt-6 bg-blue-600 text-white px-6 py-3 rounded-lg"
    >
      Update Preview
    </button>

    <button
      onclick="generatePDF()"
      class="mt-6 ml-3 bg-green-600 text-white px-6 py-3 rounded-lg"
    >
      Download PDF
    </button>

  </div>

  <!-- INVOICE -->
  <div
    id="invoice"
    class="p-10 shadow-xl rounded-xl overflow-hidden"
  >

    <!-- Header -->
    <div class="flex justify-between items-start border-b pb-6">

      <div>
        <h1 class="text-4xl font-bold text-gray-800">
          QUOTATION
        </h1>

        <p class="text-gray-500 mt-2">
          Quote No: QT-001
        </p>

        <p class="text-gray-500">
          Date: <span id="date"></span>
        </p>
      </div>

      <div class="text-right">
        <h2 class="text-2xl font-bold">
          Your Company
        </h2>

        <p class="text-gray-500">
          Kolkata, India
        </p>

        <p class="text-gray-500">
          your@email.com
        </p>
      </div>

    </div>

    <!-- Client -->
    <div class="mt-8">

      <h3 class="text-xl font-semibold mb-2">
        Client Details
      </h3>

      <p id="previewClient" class="text-gray-700">
        Client Name
      </p>

    </div>

    <!-- Table -->
    <div class="mt-8">

      <table class="w-full border-collapse">

        <thead>

          <tr class="bg-gray-100">

            <th class="border p-3 text-left">
              Product
            </th>

            <th class="border p-3 text-center">
              Qty
            </th>

            <th class="border p-3 text-right">
              Price
            </th>

            <th class="border p-3 text-right">
              Total
            </th>

          </tr>

        </thead>

        <tbody>

          <tr>

            <td
              id="previewProduct"
              class="border p-3"
            >
              Product
            </td>

            <td
              id="previewQty"
              class="border p-3 text-center"
            >
              1
            </td>

            <td
              id="previewPrice"
              class="border p-3 text-right"
            >
              ₹0
            </td>

            <td
              id="previewTotal"
              class="border p-3 text-right font-semibold"
            >
              ₹0
            </td>

          </tr>

        </tbody>

      </table>

    </div>

    <!-- Summary -->
    <div class="mt-10 flex justify-end">

      <div class="w-72">

        <div class="flex justify-between py-2 border-b">

          <span class="font-medium">
            Subtotal
          </span>

          <span id="subtotal">
            ₹0
          </span>

        </div>

        <div class="flex justify-between py-2 border-b">

          <span class="font-medium">
            GST (18%)
          </span>

          <span id="gst">
            ₹0
          </span>

        </div>

        <div class="flex justify-between py-3 text-xl font-bold">

          <span>
            Grand Total
          </span>

          <span id="grandTotal">
            ₹0
          </span>

        </div>

      </div>

    </div>

    <!-- Footer -->
    <div class="mt-20">

      <p class="text-gray-500 text-sm">
        Thank you for your business.
      </p>

    </div>

  </div>

  <script>

    // Set Current Date
    document.getElementById("date").innerText =
      new Date().toLocaleDateString();

    function updateInvoice() {

      const client =
        document.getElementById("clientName").value;

      const product =
        document.getElementById("product").value;

      const qty =
        Number(document.getElementById("quantity").value);

      const price =
        Number(document.getElementById("price").value);

      const total = qty * price;

      const gst = total * 0.18;

      const grandTotal = total + gst;

      // Update Preview
      document.getElementById("previewClient")
        .innerText = client;

      document.getElementById("previewProduct")
        .innerText = product;

      document.getElementById("previewQty")
        .innerText = qty;

      document.getElementById("previewPrice")
        .innerText = `₹${price}`;

      document.getElementById("previewTotal")
        .innerText = `₹${total}`;

      document.getElementById("subtotal")
        .innerText = `₹${total}`;

      document.getElementById("gst")
        .innerText = `₹${gst.toFixed(2)}`;

      document.getElementById("grandTotal")
        .innerText = `₹${grandTotal.toFixed(2)}`;
    }

    function generatePDF() {

      const element =
        document.getElementById("invoice");

      const options = {

        margin: 0,

        filename: 'quotation.pdf',

        image: {
          type: 'jpeg',
          quality: 1
        },

        html2canvas: {
          scale: 2
        },

        jsPDF: {
          unit: 'mm',
          format: 'a4',
          orientation: 'portrait'
        }

      };

      html2pdf()
        .set(options)
        .from(element)
        .save();

    }

  </script>

</body>
</html>
